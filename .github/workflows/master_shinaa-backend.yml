# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Bun app to Azure Web App - shinaa-backend

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for actions/checkout

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Monorepo Dependencies
        run: bun install --frozen-lockfile

      - name: Build Shared Types Package
        run: bun run --cwd packages/shared-types build

      - name: Build Database Package
        run: bun run --cwd packages/database build

      - name: Generate Prisma Client
        run: bun run --cwd packages/database db:generate

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bun-app
          path: .
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # Required for requesting the JWT via OIDC
      contents: read # Required for actions/checkout

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: bun-app

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EFDE379F61C64E1E931E8FFE2710A29B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7884081497464AF3BF745789EB9610CC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5355D22A23A849F2AAE4353D8047C435 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'shinaa-backend'
          slot-name: 'Production'
          package: .
